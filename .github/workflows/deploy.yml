name: deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bong_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --group dev --directory backend

      - name: Run migrations
        run: cd backend && uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/bong_test

      - name: Run tests
        run: cd backend && uv run python -m pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/bong_test
          ANTHROPIC_API_KEY: test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            nix run nixpkgs#skopeo -- login ghcr.io \
              --username "${{ github.actor }}" --password-stdin

      - name: Build and push backend image
        run: |
          nix build .#backend-image
          ./result | nix run nixpkgs#skopeo -- copy --insecure-policy \
            docker-archive:/dev/stdin \
            docker://ghcr.io/philip-730/bong-registry-backend:latest

      - name: Build and push frontend image
        run: |
          nix build .#frontend-image
          ./result | nix run nixpkgs#skopeo -- copy --insecure-policy \
            docker-archive:/dev/stdin \
            docker://ghcr.io/philip-730/bong-registry-frontend:latest
